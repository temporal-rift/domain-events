name: Publish Domain Events

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.20.0
        with:
          java-version: 25
          java-distribution: temurin
          maven-version: 3.9.13
          settings-servers: '[{"id":"github-temporal-rift-bom","username":"${{ github.actor }}","password":"${{ secrets.GITHUB_TOKEN }}"}]'

      - name: Check if version already published
        id: version_check
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          "https://maven.pkg.github.com/temporal-rift/domain-events/com/temporalrift/domain-events/$VERSION/domain-events-$VERSION.pom")

          echo "HTTP Status: $STATUS"
          echo "VERSION_CHANGED=$( [ "$STATUS" = "200" ] && echo false || echo true )" >> $GITHUB_ENV

      - name: Publish to GitHub Packages
        if: env.VERSION_CHANGED == 'true'
        run: mvn --batch-mode deploy -Pghrepo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        if: env.VERSION_CHANGED == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag v$VERSION
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/temporal-rift/domain-events.git v$VERSION