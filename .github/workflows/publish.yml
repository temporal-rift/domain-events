name: Publish Domain Events

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.20.0
        with:
          java-version: 25
          java-distribution: temurin
          maven-version: 3.9.13
          settings-servers: |
            [
              {
                "id": "github-domain-events",
                "username": "${{ github.actor }}",
                "password": "${{ secrets.GITHUB_TOKEN }}"
              },
              {
                "id": "github-temporal-rift-bom",
                "username": "TU_USUARIO_GITHUB",
                "password": "${{ secrets.GH_PACKAGES_TOKEN }}"
              }
            ]

      - name: Check if version already published
        id: version_check
        run: |
          echo "--- Resolving project version ---"
          set +e
          mvn help:evaluate -Dexpression=project.version -DforceStdout > /tmp/mvn_version.txt 2>&1
          MVN_EXIT=$?
          set -e
          echo "mvn output:"
          cat /tmp/mvn_version.txt
          if [ $MVN_EXIT -ne 0 ]; then
            echo "ERROR: mvn help:evaluate failed (exit $MVN_EXIT)"
            exit 1
          fi
          # The version is the last non-empty line of output
          VERSION=$(grep -v '^\[' /tmp/mvn_version.txt | tail -1 | tr -d '[:space:]')
          echo "Resolved version: '$VERSION'"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          REGISTRY_URL="https://maven.pkg.github.com/temporal-rift/domain-events/com/temporalrift/domain-events/$VERSION/domain-events-$VERSION.pom"
          echo "--- Checking registry URL ---"
          echo "URL: $REGISTRY_URL"

          RESPONSE=$(curl -s -o /tmp/registry_response.txt -w "%{http_code}" -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "$REGISTRY_URL") || true
          CURL_EXIT=$?

          echo "curl exit code : $CURL_EXIT"
          echo "HTTP status    : $RESPONSE"
          echo "Response body  :"
          cat /tmp/registry_response.txt || true

          if [ $CURL_EXIT -ne 0 ]; then
            echo "ERROR: curl failed with exit code $CURL_EXIT — treating version as unpublished"
            echo "VERSION_CHANGED=true" >> $GITHUB_ENV
          elif [ "$RESPONSE" = "200" ]; then
            echo "Version $VERSION already exists in registry — skipping publish"
            echo "VERSION_CHANGED=false" >> $GITHUB_ENV
          else
            echo "Version $VERSION not found in registry (HTTP $RESPONSE) — will publish"
            echo "VERSION_CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Publish to GitHub Packages
        if: env.VERSION_CHANGED == 'true'
        run: mvn --batch-mode deploy -Pghrepo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        if: env.VERSION_CHANGED == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag v$VERSION
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/temporal-rift/domain-events.git v$VERSION