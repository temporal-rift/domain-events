name: Publish Domain Events

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.20.0
        with:
          java-version: 25
          java-distribution: temurin
          maven-version: 3.9.13
          settings-servers: |
            [
              {
                "id": "central",
                "username": "${{ secrets.SONATYPE_USERNAME }}",
                "password": "${{ secrets.SONATYPE_PASSWORD }}"
              }
            ]

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Wait for parent BOM to be available in Maven Central
        run: |
          BOM_VERSION=$(grep -A3 '<parent>' pom.xml | grep '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d '[:space:]')
          BOM_URL="https://repo1.maven.org/maven2/io/github/temporal-rift/temporal-rift-bom/${BOM_VERSION}/temporal-rift-bom-${BOM_VERSION}.pom"
          echo "Waiting for BOM ${BOM_VERSION} at: ${BOM_URL}"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$BOM_URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "BOM is available in Maven Central"
              exit 0
            fi
            sleep 60
          done
          echo "ERROR: BOM not available in Maven Central after 30 minutes"
          exit 1

      - name: Check if version already published
        id: version_check
        run: |
          echo "--- Resolving project version ---"
          set +e
          mvn help:evaluate -Dexpression=project.version -DforceStdout > /tmp/mvn_version.txt 2>&1
          MVN_EXIT=$?
          set -e
          echo "mvn output:"
          cat /tmp/mvn_version.txt
          if [ $MVN_EXIT -ne 0 ]; then
            echo "ERROR: mvn help:evaluate failed (exit $MVN_EXIT)"
            exit 1
          fi
          VERSION=$(grep -v '^\[' /tmp/mvn_version.txt | tail -1 | tr -d '[:space:]')
          echo "Resolved version: '$VERSION'"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          REGISTRY_URL="https://repo1.maven.org/maven2/io/github/temporal-rift/domain-events/${VERSION}/domain-events-${VERSION}.pom"
          echo "--- Checking Maven Central ---"
          echo "URL: $REGISTRY_URL"

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -L "$REGISTRY_URL") || true

          echo "HTTP status: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "Version $VERSION already exists in Maven Central — skipping publish"
            echo "VERSION_CHANGED=false" >> $GITHUB_ENV
          else
            echo "Version $VERSION not found in Maven Central (HTTP $RESPONSE) — will publish"
            echo "VERSION_CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Publish to Maven Central
        if: env.VERSION_CHANGED == 'true'
        run: mvn --batch-mode deploy -Pcentral

      - name: Create and push tag
        if: env.VERSION_CHANGED == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag v$VERSION
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/temporal-rift/domain-events.git v$VERSION
